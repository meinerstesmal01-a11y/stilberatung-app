<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Friseur Bergemann – Digitale Stilberatung</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F3F2EE; color: #15120F; }
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Jost:wght@400;500;600&display=swap');
    .display { font-family: 'Cormorant Garamond', serif; }
    .eyebrow { font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; font-weight: 500; color: #6B655D; }
    @keyframes floatUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade-step { animation: floatUp 0.55s ease both; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const React = window.React;
    const { useState, useRef } = React;
    const ReactDOM = window.ReactDOM;
    const { Scissors, ShieldCheck, Upload, Camera, Sparkles, Check, AlertCircle, ArrowRight, ArrowLeft, Heart, RotateCcw, X, CalendarCheck, MapPin, Phone } = window.lucide;

    const BACKEND_URL = "https://stilberatung-backend-production.up.railway.app/api/stilberatung";
    const BOOKING_URL = "https://phorest.com/book/salons/friseurthomasbergemann";
    const LOGO_URL = "https://friseur-bergemann.com/wp-content/uploads/2024/09/Friseur-Bergemann-Bochum-Logo-Weiss.webp";

    const colors = { bg: "#F3F2EE", surface: "#FBFAF7", ink: "#15120F", inkSoft: "#6B655D", line: "#DCD7CD", hairline: "#C8C2B6" };

    const QUESTIONS = [
      { id: "laenge", label: "Wunschlänge", opts: ["Kürzer", "Ähnlich", "Länger"] },
      { id: "stil", label: "Stilrichtung", opts: ["Klassisch", "Modern", "Natürlich", "Auffällig"] },
      { id: "farbe", label: "Haarfarbe", opts: ["Beibehalten", "Wärmer", "Kühler", "Heller", "Dunkler", "Ganz neu"] },
      { id: "anlass", label: "Anlass", opts: ["Alltag", "Business", "Besonderes Event"] },
      { id: "pflege", label: "Pflegeaufwand", opts: ["Niedrig", "Mittel", "Hoch"] },
    ];

    function App() {
      const [step, setStep] = useState("intro");
      const [consent, setConsent] = useState({ verarbeitung: false, generierung: false, loeschung: false });
      const [photos, setPhotos] = useState({ front: null, side: null });
      const [answers, setAnswers] = useState({});
      const [favorite, setFavorite] = useState(null);
      const [results, setResults] = useState(null);
      const [genError, setGenError] = useState(false);

      const allConsent = consent.verarbeitung && consent.generierung && consent.loeschung;
      const allPhotos = !!photos.front;
      const allAnswers = QUESTIONS.every(q => answers[q.id]);

      const reset = () => {
        setStep("intro");
        setConsent({ verarbeitung: false, generierung: false, loeschung: false });
        setPhotos({ front: null, side: null });
        setAnswers({});
        setFavorite(null);
        setResults(null);
        setGenError(false);
      };

      const generate = async () => {
        setGenError(false);
        setResults(null);
        setFavorite(null);
        setStep("processing");

        if (BACKEND_URL && photos.front?.file) {
          try {
            const fd = new FormData();
            fd.append("front", photos.front.file);
            if (photos.side?.file) fd.append("side", photos.side.file);
            fd.append("wishes", JSON.stringify(answers));
            const res = await fetch(BACKEND_URL, { method: "POST", body: fd });
            if (!res.ok) throw new Error("HTTP " + res.status);
            const data = await res.json();
            setResults(Array.isArray(data.looks) ? data.looks : []);
            setStep("results");
            return;
          } catch (e) {
            console.error("Generierung fehlgeschlagen:", e);
            setGenError(true);
            setStep("results");
            return;
          }
        }
        setTimeout(() => { setResults(null); setStep("results"); }, 2600);
      };

      return (
        <div style={{ background: colors.bg, minHeight: "100vh", color: colors.ink }}>
          <div style={{ maxWidth: 720, margin: "0 auto", padding: "0 20px" }}>
            <Header />
            <div style={{ padding: "40px 0 50px" }}>
              {step === "intro" && <Intro onStart={() => setStep("consent")} />}
              {step === "consent" && <Consent consent={consent} setConsent={setConsent} allConsent={allConsent} onBack={() => setStep("intro")} onNext={() => setStep("upload")} />}
              {step === "upload" && <UploadStep photos={photos} setPhotos={setPhotos} allPhotos={allPhotos} onBack={() => setStep("consent")} onNext={() => setStep("quiz")} />}
              {step === "quiz" && <Quiz answers={answers} setAnswers={setAnswers} allAnswers={allAnswers} onBack={() => setStep("upload")} onNext={generate} />}
              {step === "processing" && <Processing />}
              {step === "results" && <Results answers={answers} results={results} error={genError} onRetry={generate} favorite={favorite} setFavorite={setFavorite} onReset={reset} />}
            </div>
            <Footer />
          </div>
        </div>
      );
    }

    function Header() {
      const [logoOk, setLogoOk] = useState(true);
      return (
        <div style={{ background: colors.ink, padding: "30px 0 26px", textAlign: "center", marginLeft: -20, marginRight: -20, paddingLeft: 20, paddingRight: 20 }}>
          {logoOk ? (
            <img src={LOGO_URL} alt="Friseur Bergemann" onError={() => setLogoOk(false)} style={{ height: 38, maxWidth: "72%", objectFit: "contain" }} />
          ) : (
            <div className="display" style={{ fontSize: 26, fontWeight: 500, letterSpacing: "1px", color: "#fff" }}>FRISEUR BERGEMANN</div>
          )}
          <div className="eyebrow" style={{ color: "rgba(255,255,255,.55)", marginTop: 11 }}>Bochum · Digitale Stilberatung</div>
        </div>
      );
    }

    function Btn({ children, onClick, disabled, variant = "primary", style: customStyle }) {
      const baseStyle = {
        fontFamily: "'Jost', sans-serif",
        fontWeight: 500,
        fontSize: 13.5,
        letterSpacing: "1.5px",
        textTransform: "uppercase",
        padding: "14px 26px",
        border: "none",
        cursor: disabled ? "not-allowed" : "pointer",
        display: "inline-flex",
        alignItems: "center",
        gap: 9,
        opacity: disabled ? 0.35 : 1,
        transition: "all 0.15s",
        ...customStyle,
      };
      const variantStyle = variant === "primary" ? { background: colors.ink, color: "#fff" } : { background: "transparent", color: colors.inkSoft };
      return <button onClick={onClick} disabled={disabled} style={{ ...baseStyle, ...variantStyle }}>{children}</button>;
    }

    function Intro({ onStart }) {
      return (
        <div style={{ textAlign: "center", paddingTop: 52 }}>
          <div className="eyebrow">Sieh deinen neuen Look — bevor die Schere ansetzt</div>
          <h1 className="display" style={{ fontSize: 58, lineHeight: 1.02, fontWeight: 500, margin: "22px 0 0" }}>Schöne Haare<br />sind kein Zufall.</h1>
          <div style={{ width: 44, height: 1, background: colors.hairline, margin: "26px auto" }} />
          <p style={{ fontSize: 16, lineHeight: 1.65, color: colors.inkSoft, maxWidth: 440, margin: "0 auto", fontWeight: 300 }}>
            Lade ein Foto hoch, erzähl uns von deinen Wünschen — und erhalte drei persönliche Looks, abgestimmt auf deine Gesichtsform und deinen Typ.
          </p>
          <div style={{ display: "flex", justifyContent: "center", gap: 28, margin: "34px 0 30px", flexWrap: "wrap" }}>
            {[["01", "Foto hoch"], ["02", "Wünsche wählen"], ["03", "3 Looks erhalten"]].map(([n, t]) => (
              <div key={n} style={{ textAlign: "center" }}>
                <div className="display" style={{ fontSize: 28, fontWeight: 500 }}>{n}</div>
                <div className="eyebrow" style={{ marginTop: 4, fontSize: 10.5 }}>{t}</div>
              </div>
            ))}
          </div>
          <Btn onClick={onStart}>Beratung starten <ArrowRight size={16} /></Btn>
        </div>
      );
    }

    function Consent({ consent, setConsent, allConsent, onBack, onNext }) {
      const items = [
        { key: "verarbeitung", title: "Verarbeitung meines Fotos", text: "Ich willige ein, dass mein Foto zur Analyse verarbeitet wird." },
        { key: "generierung", title: "KI-Generierung", text: "Mein Foto wird an einen KI-Dienst übermittelt. Die Ergebnisse sind unverbindliche Vorschauen." },
        { key: "loeschung", title: "Löschung & Freiwilligkeit", text: "Mein Foto wird nach der Generierung gelöscht. Die Nutzung ist freiwillig." },
      ];
      return (
        <div style={{ paddingTop: 40 }}>
          <h2 className="display" style={{ fontSize: 38, fontWeight: 500, margin: "0 0 20px" }}>Deine Einwilligung</h2>
          {items.map(it => (
            <label key={it.key} style={{ display: "flex", gap: 14, padding: "17px", marginBottom: 11, cursor: "pointer", background: colors.surface, border: `1px solid ${consent[it.key] ? colors.ink : colors.line}` }}>
              <div style={{ width: 22, height: 22, minWidth: 22, marginTop: 1, background: consent[it.key] ? colors.ink : "transparent", border: `1px solid ${consent[it.key] ? colors.ink : colors.hairline}`, display: "grid", placeItems: "center" }}>
                {consent[it.key] && <Check size={14} color="#fff" />}
              </div>
              <input type="checkbox" checked={consent[it.key]} onChange={e => setConsent({ ...consent, [it.key]: e.target.checked })} style={{ display: "none" }} />
              <div>
                <div style={{ fontWeight: 500, fontSize: 14.5, marginBottom: 3 }}>{it.title}</div>
                <div style={{ fontSize: 13, lineHeight: 1.5, color: colors.inkSoft }}>{it.text}</div>
              </div>
            </label>
          ))}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 30 }}>
            <Btn variant="ghost" onClick={onBack}><ArrowLeft size={15} /> Zurück</Btn>
            <Btn onClick={onNext} disabled={!allConsent}>Einverstanden <ArrowRight size={15} /></Btn>
          </div>
        </div>
      );
    }

    function UploadStep({ photos, setPhotos, allPhotos, onBack, onNext }) {
      return (
        <div style={{ paddingTop: 40 }}>
          <h2 className="display" style={{ fontSize: 38, fontWeight: 500, margin: "0 0 20px" }}>Deine Fotos</h2>
          <p style={{ fontSize: 14.5, color: colors.inkSoft, marginBottom: 24 }}>Ein Frontalbild ist Pflicht. Gleichmäßiges Licht, Haare frei.</p>
          <div style={{ display: "flex", gap: 14, flexWrap: "wrap" }}>
            <PhotoSlot label="Frontal" required value={photos.front} onChange={v => setPhotos({ ...photos, front: v })} />
            <PhotoSlot label="Seitlich" value={photos.side} onChange={v => setPhotos({ ...photos, side: v })} />
          </div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 30 }}>
            <Btn variant="ghost" onClick={onBack}><ArrowLeft size={15} /> Zurück</Btn>
            <Btn onClick={onNext} disabled={!allPhotos}>Weiter <ArrowRight size={15} /></Btn>
          </div>
        </div>
      );
    }

    function PhotoSlot({ label, required, value, onChange }) {
      const inputRef = useRef();
      const onFile = e => {
        const f = e.target.files?.[0];
        if (f) onChange({ url: URL.createObjectURL(f), file: f });
      };
      return (
        <div style={{ flex: "1 1 200px" }}>
          <div onClick={() => inputRef.current?.click()} style={{
            position: "relative", aspectRatio: "3/4", cursor: "pointer", overflow: "hidden",
            border: `1px ${value ? "solid" : "dashed"} ${value ? colors.ink : colors.hairline}`, background: value ? "#000" : colors.surface,
            display: "grid", placeItems: "center"
          }}>
            {value ? (
              <>
                <img src={value.url} alt={label} style={{ width: "100%", height: "100%", objectFit: "cover", opacity: 0.9 }} />
                <div onClick={e => { e.stopPropagation(); onChange(null); }} style={{ position: "absolute", top: 10, right: 10, width: 28, height: 28, background: "rgba(0,0,0,.6)", display: "grid", placeItems: "center" }}>
                  <X size={15} color="#fff" />
                </div>
                <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, background: colors.ink, color: "#fff", padding: "8px 12px", fontSize: 10.5, display: "flex", gap: 6, alignItems: "center" }}>
                  <Check size={12} /> {label}
                </div>
              </>
            ) : (
              <div style={{ textAlign: "center", color: colors.inkSoft }}>
                <Upload size={24} color={colors.ink} />
                <div style={{ fontWeight: 500, fontSize: 15, marginTop: 10 }}>{label}{required && " *"}</div>
                <div style={{ fontSize: 12, marginTop: 3 }}>Tippen zum Hochladen</div>
              </div>
            )}
          </div>
          <input ref={inputRef} type="file" accept="image/*" onChange={onFile} style={{ display: "none" }} />
        </div>
      );
    }

    function Quiz({ answers, setAnswers, allAnswers, onBack, onNext }) {
      return (
        <div style={{ paddingTop: 40 }}>
          <h2 className="display" style={{ fontSize: 38, fontWeight: 500, margin: "0 0 20px" }}>Deine Wünsche</h2>
          <p style={{ fontSize: 14.5, color: colors.inkSoft, marginBottom: 22 }}>Je genauer, desto besser treffen wir deinen Look.</p>
          {QUESTIONS.map(q => (
            <div key={q.id} style={{ marginBottom: 22 }}>
              <div className="eyebrow" style={{ marginBottom: 11 }}>{q.label}</div>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                {q.opts.map(o => {
                  const on = answers[q.id] === o;
                  return (
                    <button key={o} onClick={() => setAnswers({ ...answers, [q.id]: o })} style={{
                      fontFamily: "'Jost', sans-serif", fontSize: 13.5, fontWeight: 400, padding: "10px 17px", cursor: "pointer",
                      background: on ? colors.ink : colors.surface, color: on ? "#fff" : colors.ink, border: `1px solid ${on ? colors.ink : colors.line}`
                    }}>{o}</button>
                  );
                })}
              </div>
            </div>
          ))}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 30 }}>
            <Btn variant="ghost" onClick={onBack}><ArrowLeft size={15} /> Zurück</Btn>
            <Btn onClick={onNext} disabled={!allAnswers}>Looks generieren <ArrowRight size={15} /></Btn>
          </div>
        </div>
      );
    }

    function Processing() {
      return (
        <div style={{ paddingTop: 100, textAlign: "center" }}>
          <div style={{ width: 58, height: 58, margin: "0 auto", border: `1px solid ${colors.line}`, borderTopColor: colors.ink, borderRadius: "50%", animation: "spin 1s linear infinite" }} />
          <h2 className="display" style={{ fontSize: 32, fontWeight: 500, marginTop: 30 }}>Wir gestalten deine Looks …</h2>
          <p style={{ fontSize: 14, color: colors.inkSoft, marginTop: 10 }}>Bitte warten …</p>
        </div>
      );
    }

    function Results({ answers, results, error, onRetry, favorite, setFavorite, onReset }) {
      const real = Array.isArray(results) && results.length > 0;
      const bgs = ["linear-gradient(155deg,#2b2b2b,#555)", "linear-gradient(155deg,#3a3531,#8a8178)", "linear-gradient(155deg,#1f1f1f,#444)"];
      const meta = [
        { name: answers.stil === "Auffällig" ? "Statement Cut" : "Soft Classic", desc: `${answers.laenge || "Ähnliche"} Länge, ${answers.stil || "moderner"} Stil` },
        { name: answers.anlass === "Business" ? "Clean & Sharp" : "Effortless Texture", desc: `Farbe: ${answers.farbe || "wie gehabt"}` },
        { name: answers.farbe === "Ganz neu" ? "Bold Refresh" : "Natural Refine", desc: `Pflege: ${answers.pflege || "mittel"}` },
      ];

      if (error) {
        return (
          <div style={{ paddingTop: 60, textAlign: "center" }}>
            <AlertCircle size={34} color={colors.ink} style={{ margin: "0 auto" }} />
            <h2 className="display" style={{ fontSize: 32, fontWeight: 500, margin: "16px 0 6px" }}>Das hat nicht geklappt</h2>
            <p style={{ fontSize: 14, color: colors.inkSoft, marginBottom: 24 }}>Die Generierung ist fehlgeschlagen. Bitte erneut versuchen.</p>
            <div style={{ display: "flex", gap: 12, justifyContent: "center" }}>
              <Btn onClick={onRetry}><RotateCcw size={15} /> Erneut versuchen</Btn>
              <Btn variant="ghost" onClick={onReset}>Neu starten</Btn>
            </div>
          </div>
        );
      }

      return (
        <div style={{ paddingTop: 40 }}>
          <h2 className="display" style={{ fontSize: 38, fontWeight: 500, margin: "0 0 20px" }}>Drei Looks für dich</h2>
          <p style={{ fontSize: 14.5, color: colors.inkSoft, marginBottom: 22 }}>Markiere deinen Favoriten.</p>
          {!real && <div style={{ fontSize: 11.5, color: colors.inkSoft, background: colors.surface, border: `1px solid ${colors.line}`, padding: "9px 13px", marginBottom: 22 }}>Demo-Modus: Platzhalter. Echte Fotos vom Backend.</div>}
          <div style={{ display: "grid", gap: 12 }}>
            {meta.map((l, i) => {
              const on = favorite === i;
              return (
                <div key={i} style={{ display: "flex", gap: 15, padding: 13, background: colors.surface, border: `1px solid ${on ? colors.ink : colors.line}` }}>
                  <div style={{ width: 92, flexShrink: 0, aspectRatio: "3/4", overflow: "hidden", background: l.img ? "#000" : (bgs[i] || "#ccc"), display: "grid", placeItems: "center" }}>
                    {real && results[i] ? <img src={results[i]} alt={l.name} style={{ width: "100%", height: "100%", objectFit: "cover" }} /> : <Scissors size={20} color="rgba(255,255,255,.8)" />}
                  </div>
                  <div style={{ flex: 1 }}>
                    <div className="display" style={{ fontSize: 24, fontWeight: 500 }}>{l.name}</div>
                    <div style={{ fontSize: 12.5, color: colors.inkSoft, lineHeight: 1.5, margin: "6px 0 12px" }}>{l.desc}</div>
                    <button onClick={() => setFavorite(on ? null : i)} style={{ className: "eyebrow", fontSize: 10.5, padding: "8px 15px", cursor: "pointer", border: `1px solid ${colors.ink}`, background: on ? colors.ink : "transparent", color: on ? "#fff" : colors.ink, display: "inline-flex", alignItems: "center", gap: 7 }}>
                      <Heart size={12} fill={on ? "#fff" : "none"} /> {on ? "Favorit" : "Gefällt mir"}
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{ display: "flex", gap: 14, marginTop: 28, flexWrap: "wrap" }}>
            <Btn onClick={() => window.open(BOOKING_URL, "_blank")} disabled={favorite === null} style={{ flex: "1 1 auto", justifyContent: "center" }}>
              <CalendarCheck size={16} /> Zum Termin
            </Btn>
            <Btn variant="ghost" onClick={onReset}><RotateCcw size={14} /> Neu</Btn>
          </div>
        </div>
      );
    }

    function Footer() {
      return (
        <div style={{ borderTop: `1px solid ${colors.line}`, padding: "26px 0 30px", display: "flex", gap: 20, flexWrap: "wrap", justifyContent: "space-between" }}>
          <div style={{ fontSize: 12.5, color: colors.inkSoft, lineHeight: 1.6 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 7 }}><MapPin size={13} /> Riemker Straße 13–15, 44809 Bochum</div>
            <div style={{ display: "flex", alignItems: "center", gap: 7, marginTop: 5 }}><Phone size={13} /> 0234 9041390</div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
